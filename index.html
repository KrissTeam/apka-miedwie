<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeachBar Miedwie</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #e0f7ff 0%, #f8fafc 45%, #ffffff 100%);
      color: #0f172a;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 28px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      border: 1px solid #e2e8f0;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      font-weight: 900;
      color: #0f172a;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.45;
      color: #64748b;
      font-weight: 600;
    }

    .features {
      margin: 24px 0;
      display: grid;
      gap: 10px;
      text-align: left;
      font-size: 15px;
      color: #334155;
      font-weight: 700;
    }

    .feature {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 12px 14px;
    }

    .button {
      display: block;
      width: 100%;
      text-decoration: none;
      background: #198754;
      color: white;
      font-size: 18px;
      font-weight: 900;
      padding: 17px 20px;
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(25, 135, 84, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .button:active {
      transform: scale(0.98);
      box-shadow: 0 6px 14px rgba(25, 135, 84, 0.22);
    }

    .small {
      margin-top: 16px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo">🌊</div>

    <h1>BeachBar Miedwie</h1>

    <div class="subtitle">
      Grafik, wolne i raporty pracowników
    </div>

    <div class="features">
      <div class="feature">📅 Sprawdź grafik</div>
      <div class="feature">➕ Zgłoś wolne</div>
      <div class="feature">📝 Wyślij raport dnia</div>
    </div>

    <a class="button" href="https://script.google.com/macros/s/AKfycbw6r2N3Sy224yyNmi3TD7ry7RfH3uneL0Lq5Iwb2RDqiz_89yz-mSur6dlebQppQmh_/exec">
      OTWÓRZ APLIKACJĘ
    </a>

    <div class="small">
      Po kliknięciu otworzy się aplikacja BeachBar Miedwie.
    </div>
  </main>
</body>
</html>
