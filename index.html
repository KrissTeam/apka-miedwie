<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeachBar Miedwie</title>

  <style>
    :root {
      --primary: #198754;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --danger: #dc3545;
      --danger-light: #fde8e8;
      --success-light: #e8f5e9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border-radius: 22px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    .logo {
      font-size: 42px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    p {
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 18px;
    }

    select {
      width: 100%;
      height: 52px;
      padding: 0 16px;
      border-radius: 12px;
      border: 2px solid var(--border);
      font-size: 16px;
      font-weight: 700;
      background: white;
      outline: none;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      height: 52px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    #result {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-weight: 800;
      display: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">🌊</div>
    <h1>BeachBar Miedwie</h1>
    <p>Nowa aplikacja GitHub — pobieranie pracowników z arkusza</p>

    <select id="employeeSelect">
      <option value="">Ładowanie pracowników...</option>
    </select>

    <button onclick="enterApp()">Wejdź do aplikacji</button>

    <div id="result"></div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycby6rQK89ooACcz7faroqmdpkGauP9MQl6y6e93PD6lhM0JIGPC5qE4RpBl7A6KMtgb6/exec';

    window.onload = function() {
      loadEmployees();
    };

    function showMessage(text, type) {
      const result = document.getElementById('result');
      result.style.display = 'block';

      if (type === 'error') {
        result.style.background = '#fde8e8';
        result.style.color = '#dc3545';
      } else {
        result.style.background = '#e8f5e9';
        result.style.color = '#198754';
      }

      result.innerText = text;
    }

    function loadEmployees() {
      const select = document.getElementById('employeeSelect');

      fetch(API_URL + '?action=getEmployees')
        .then(response => response.json())
        .then(employees => {
          select.innerHTML = '<option value="">Wybierz pracownika...</option>';

          employees.forEach(function(emp) {
            const option = document.createElement('option');
            option.value = emp;
            option.textContent = emp;
            select.appendChild(option);
          });
        })
        .catch(error => {
          select.innerHTML = '<option value="">Błąd ładowania</option>';
          showMessage('❌ Nie udało się pobrać pracowników.', 'error');
          console.error(error);
        });
    }

    function enterApp() {
      const employee = document.getElementById('employeeSelect').value;

      if (!employee) {
        showMessage('⚠️ Wybierz pracownika', 'error');
        return;
      }

      showMessage('✅ Wybrano: ' + employee, 'success');
    }
  </script>
</body>
</html>
